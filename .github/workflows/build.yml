name: Build spowerwk

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── 并行 Job 1：下载 PDB 并生成 RVA 数据库 ────────────────────────────────
  build-rva-db:
    runs-on: windows-latest
    env:
      PYTHONUTF8: 1
      PYTHONIOENCODING: utf8
    steps:
    - uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Install LLVM (for llvm-pdbutil)
      run: choco install llvm --yes

    - name: Download PDBs and Generate RVA Database
      run: |
        python pdb/pdb_download.py winlogon.exe
        python pdb/pdb2json.py

    - name: Compress RVA Database with LZMA
      run: |
        python -c "import lzma; print('Compressing unified_rva_db.json...'); open('unified_rva_db.json.xz', 'wb').write(lzma.compress(open('unified_rva_db.json', 'rb').read())); print('Compression done.')"

    - name: Upload RVA Database
      uses: actions/upload-artifact@v7
      with:
        name: rva-database
        path: unified_rva_db.json.xz

  # ── 并行 Job 2：编译 C++ Hook DLL ─────────────────────────────────────────
  build-dll:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v6

    - name: Setup MSVC
      uses: TheMrMilchmann/setup-msvc-dev@v4
      with:
        arch: x64

    - name: Build C++ Hook DLL
      shell: cmd
      run: |
        cl /LD /EHsc /O2 /MT /FespowerwkHook.dll src\hook\dllmain.cpp /I include /link lib\libMinHook.x64.lib Advapi32.lib Wtsapi32.lib Ntdll.lib User32.lib /NODEFAULTLIB:MSVCRT
        mkdir build\Release
        move spowerwkHook.dll build\Release\spowerwkHook.dll

    - name: Upload Hook DLL
      uses: actions/upload-artifact@v7
      with:
        name: hook-dll
        path: build/Release/spowerwkHook.dll

  # ── 并行 Job 3：打包 Python 服务 ──────────────────────────────────────────
  build-service:
    runs-on: windows-latest
    env:
      PYTHONUTF8: 1
      PYTHONIOENCODING: utf8
    steps:
    - uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Setup MSVC
      uses: TheMrMilchmann/setup-msvc-dev@v4
      with:
        arch: x64

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt nuitka ordered-set zstandard

    - name: Build Python Service with Nuitka onefile (spowerwk_svc)
      shell: pwsh
      run: |
        $env:PYTHONPATH = "src\service"
        python -m nuitka `
          --onefile `
          --windows-console-mode=disable `
          --assume-yes-for-downloads `
          --include-module=crypto `
          --include-module=p2p `
          --include-module=injector `
          --include-module=win32service `
          --include-module=win32serviceutil `
          --include-module=win32event `
          --include-module=servicemanager `
          --include-module=win32file `
          --include-module=win32pipe `
          --include-module=win32security `
          --include-module=win32timezone `
          --include-module=pywintypes `
          --output-filename=spowerwk_svc.exe `
          src\service\main.py
        New-Item -ItemType Directory -Force dist\spowerwk_svc | Out-Null
        Move-Item spowerwk_svc.exe dist\spowerwk_svc\

    - name: Upload Service
      uses: actions/upload-artifact@v7
      with:
        name: spowerwk-svc
        path: dist/spowerwk_svc/

  # ── 汇合 Job：等待上述三者完成后打包最终安装包 ───────────────────────────
  build-installer:
    runs-on: windows-latest
    needs: [build-rva-db, build-dll, build-service]
    env:
      PYTHONUTF8: 1
      PYTHONIOENCODING: utf8
    steps:
    - uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Setup MSVC
      uses: TheMrMilchmann/setup-msvc-dev@v4
      with:
        arch: x64

    - name: Install Nuitka
      run: |
        python -m pip install --upgrade pip
        pip install nuitka ordered-set zstandard

    - name: Download RVA Database
      uses: actions/download-artifact@v8
      with:
        name: rva-database

    - name: Download Hook DLL
      uses: actions/download-artifact@v8
      with:
        name: hook-dll
        path: build/Release/

    - name: Download Service
      uses: actions/download-artifact@v8
      with:
        name: spowerwk-svc
        path: dist/spowerwk_svc/

    - name: Build Installer with Nuitka onefile (spowerwk.exe)
      shell: pwsh
      run: |
        python -m nuitka `
          --onefile `
          --assume-yes-for-downloads `
          "--include-data-dir=dist/spowerwk_svc=spowerwk_svc" `
          "--include-data-files=unified_rva_db.json.xz=unified_rva_db.json.xz" `
          "--include-data-files=build/Release/spowerwkHook.dll=spowerwkHook.dll" `
          --output-filename=spowerwk.exe `
          src\installer\install.py
        New-Item -ItemType Directory -Force dist | Out-Null
        Move-Item spowerwk.exe dist\

    - name: Upload Installer
      uses: actions/upload-artifact@v7
      with:
        name: spowerwk-installer
        path: dist/spowerwk.exe
