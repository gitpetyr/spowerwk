name: Build spowerwk

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest
    env:
      PYTHONUTF8: 1
      PYTHONIOENCODING: utf8

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt pyinstaller

    - name: Install LLVM (for llvm-pdbutil)
      run: choco install llvm --yes

    - name: Download PDBs and Generate RVA Database
      run: |
        python pdb/pdb_download.py winlogon.exe
        python pdb/pdb2json.py

    - name: Compress RVA Database with LZMA
      run: |
        python -c "import lzma; import shutil; print('Compressing unified_rva_db.json...'); open('unified_rva_db.json.xz', 'wb').write(lzma.compress(open('unified_rva_db.json', 'rb').read())); print('Compression done.')"

    - name: Build C++ Hook DLL
      shell: cmd
      run: |
        call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
        cl /LD /EHsc /O2 /MT src\hook\dllmain.cpp /I include /link lib\libMinHook.x64.lib Wtsapi32.lib Ntdll.lib /OUT:spowerwkHook.dll /NODEFAULTLIB:MSVCRT
        mkdir build\Release
        move spowerwkHook.dll build\Release\spowerwkHook.dll

    - name: Build Python Service with PyInstaller (spowerwk_svc)
      run: |
        pyinstaller --noconsole --onedir --name spowerwk_svc --hidden-import win32timezone src/service/main.py

    - name: Build Installer with PyInstaller (spowerwk.exe)
      run: |
        pyinstaller --onefile --name spowerwk --add-data "dist/spowerwk_svc;spowerwk_svc" --add-data "unified_rva_db.json.xz;." --add-data "build/Release/spowerwkHook.dll;." src/installer/install.py

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: spowerwk-installer
        path: dist/spowerwk.exe
